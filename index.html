<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Task Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body.dark-mode {
      background-color: #121212;
      color: #fff;
    }
    .priority-label {
      padding: 3px 8px;
      border-radius: 5px;
      color: white;
      font-size: 12px;
    }
    .priority-high { background-color: #dc3545; }
    .priority-medium { background-color: #ffc107; color: black; }
    .priority-low { background-color: #28a745; }
    footer {
      text-align: center;
      margin-top: 40px;
      padding: 15px;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-3">
    <a class="navbar-brand" href="#">Dashboard</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
      </ul>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="darkModeToggle">
      <label class="form-check-label" for="darkModeToggle">Dark Mode</label>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-4">
    <h2 class="text-center mb-4">Personal Task Dashboard</h2>
    <div class="row">
      <!-- Left: Task Creation Form -->
      <div class="col-md-6 mb-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-3">Task Creation</h5>
            <form id="taskForm">
              <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" class="form-control" id="taskTitle" placeholder="Enter task title">
                <div class="text-danger small" id="titleError"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="taskDesc" rows="2" placeholder="Enter task description"></textarea>
                <div class="text-danger small" id="descError"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" class="form-control" id="taskDate">
                <div class="text-danger small" id="dateError"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Priority</label>
                <select class="form-select" id="taskPriority">
                  <option value="">Select priority</option>
                  <option value="High">High</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                </select>
                <div class="text-danger small" id="priorityError"></div>
              </div>
              <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Right: Task List -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-3">Task List</h5>
            <ul class="list-group" id="taskList"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    © 2024 Your Company
    <div class="mt-2">
      <a href="#"><i class="bi bi-twitter"></i></a>
      <a href="#"><i class="bi bi-linkedin mx-2"></i></a>
      <a href="#"><i class="bi bi-github"></i></a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.js"></script>
  <script>
    const taskForm = document.getElementById("taskForm");
    const taskList = document.getElementById("taskList");
    const darkToggle = document.getElementById("darkModeToggle");

    darkToggle.addEventListener("change", () => {
      document.body.classList.toggle("dark-mode");
    });

    taskForm.addEventListener("submit", function(e) {
      e.preventDefault();
      clearErrors();

      const title = document.getElementById("taskTitle").value.trim();
      const desc = document.getElementById("taskDesc").value.trim();
      const date = document.getElementById("taskDate").value;
      const priority = document.getElementById("taskPriority").value;

      let valid = true;
      if (!title) { showError("titleError", "Title is required"); valid = false; }
      if (!desc) { showError("descError", "Description is required"); valid = false; }
      if (!date) { showError("dateError", "Due date is required"); valid = false; }
      else if (new Date(date) < new Date()) {
        showError("dateError", "Due date cannot be before today");
        valid = false;
      }
      if (!priority) { showError("priorityError", "Select a priority"); valid = false; }

      if (!valid) return;

      const li = document.createElement("li");
      li.className = "list-group-item d-flex justify-content-between align-items-center";
      li.innerHTML = `
        <div>
          <strong>${title}</strong><br>
          <small>Due: ${new Date(date).toDateString()}</small><br>
          <span class="priority-label priority-${priority.toLowerCase()}">${priority}</span>
        </div>
        <div>
          <button class="btn btn-success btn-sm me-2">Mark Complete</button>
          <button class="btn btn-danger btn-sm">Delete</button>
        </div>
      `;
      taskList.appendChild(li);
      taskForm.reset();
    });

    function showError(id, msg) {
      document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
      document.querySelectorAll(".text-danger").forEach(e => e.textContent = "");
    }
  </script>
</body>
</html>
